networks:
  internal:
    external: true
    name: "internal"

services:
  backend:
    container_name: prometheus-data
    image: ghcr.io/shredness/rd-tracker-backend:latest
    restart: unless-stopped
    networks:
      - "internal"
    volumes:
      - rdtracker:/data
    environment:
      - DB_PATH=/data/sessions.db
      - SECRET_KEY=f7K#mP2$nX9qRvL4wZ8jYtB6cHsE3uA5dGiNpW1oF0yCkVbMeQhTxJlUzDrS
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    container_name: prometheus-ui
    image: ghcr.io/shredness/rd-tracker-frontend:latest
    restart: unless-stopped
    networks:
      - "internal"
    ports:
      - "3800:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  rdtracker:
    external: true