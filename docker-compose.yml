services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/sessions.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
